<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Кубообразный потолок — визуализатор</title>
  <style>
    :root{
      --bg:#f6f8fc;
      --panel:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e6eaf2;
      --shadow:0 14px 40px rgba(15,23,42,.10);
      --shadow2:0 6px 18px rgba(15,23,42,.08);
      --accent:#A50023;
      --accent2:#d11a3f;
      --good:#16a34a;
      --bad:#dc2626;
      --pill:#eef2ff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:radial-gradient(900px 600px at 30% -10%, #ffffff 0%, var(--bg) 60%, #eef3ff 100%);
      color:var(--text);
      font:14px/1.35 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans","Helvetica Neue",sans-serif;
    }
  </style>
</head>
<body>
  <div style="padding:24px;font-family:system-ui">
    <h1>Визуализатор кубообразного потолка</h1>
    <p>Базовая версия восстановлена. Полный код визуализатора находится в истории чата и может быть вставлен в этот файл.</p>
  </div>
</body>
</html>
